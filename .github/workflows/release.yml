name: Release to npm

# Triggered when a `vX.Y.Z` tag is pushed. Uses npm Trusted Publishing
# (OIDC) — no NPM_TOKEN required once the publisher is configured at
# https://www.npmjs.com/settings/lore-hex/packages — link the package
# @lore-hex/trusted-router to:
#   GitHub owner       : Lore-Hex
#   Repository         : trusted-router-js
#   Workflow filename  : release.yml
#   Environment        : npm  (matches the `environment:` line below)
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci || npm install
      - run: npm run check
      - run: npm test

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write   # required for npm OIDC trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm publish --provenance
