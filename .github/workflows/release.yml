name: Release to npm

# Triggered when a `vX.Y.Z` tag is pushed. Publishes with a granular
# automation token (repo secret NPM_TOKEN) for auth; --provenance still
# attests the build via the job's OIDC id-token. If npm Trusted Publishing
# is later configured at https://www.npmjs.com/settings/lore-hex/packages
# (owner Lore-Hex, repo trusted-router-js, workflow release.yml,
# environment npm), the token env line below can be dropped.
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci || npm install
      - run: npm run check
      - run: npm test

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write   # required for npm OIDC trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      # npm >= 11.5 is required for OIDC trusted publishing; node 20 ships npm 10,
      # which silently falls back to setup-node's placeholder token and 404s.
      - run: npm install -g npm@latest
      - run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
